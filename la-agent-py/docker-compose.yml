services:
  postgres:
    image: docker.1ms.run/postgres:16
    platform: linux/arm64
    container_name: la-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-la-agent-py}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-BH89757@}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ./mount/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-la-agent-py}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: docker.1ms.run/redis:7
    platform: linux/arm64
    container_name: la-agent-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD:-BH89757@}']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - ./mount/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-BH89757@}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  pgvector:
    image: docker.1ms.run/pgvector/pgvector:pg16
    platform: linux/arm64
    container_name: la-agent-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGVECTOR_DB:-la-agent-vector}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: ${PGVECTOR_USER:-root}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-BH89757@}
    ports:
      - '${PGVECTOR_PORT:-5433}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PGVECTOR_USER:-root} -d ${PGVECTOR_DB:-la-agent-vector}']
      interval: 10s
      timeout: 5s
      retries: 10
